services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cims
      POSTGRES_USER: cims
      POSTGRES_PASSWORD: cims
    ports:
      - "5432:5432"
    volumes:
      - cims_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cims -d cims"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      ADDR: ":8090"
      DATABASE_URL: "postgres://cims:cims@db:5432/cims?sslmode=disable"
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD: "admin123"
      SESSION_HASH_KEY: "change-this-session-hash-key-32-bytes"
      SESSION_BLOCK_KEY: "0123456789abcdef"
    ports:
      - "8090:8090"

volumes:
  cims_pgdata:
